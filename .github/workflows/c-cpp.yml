name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'  # Active le clone du sous-module NTL

      - name: Install system dependencies (alternative to submodule)
        run: |
          sudo apt-get update
          sudo apt-get install -y libntl-dev   # À activer si tu ne veux pas de sous-module
        # Si tu utilises le sous-module, tu peux commenter cette ligne ou l'enlever.

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}-${{ matrix.os }}

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --verbose
          # ou ./RS_RUN si c'est un exécutable de test
          ./RS_RUN
